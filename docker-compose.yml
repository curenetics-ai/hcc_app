version: "3.9"

services:
  backend:
    build: ./Backend
    container_name: hcc_backend
    ports:
      - "8000:8000"
    env_file:
      - ./Backend/.env
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    depends_on: []

  frontend:
    build: ./Frontend
    container_name: hcc_frontend
    ports:
      - "8501:8501"
    environment:
    - BACKEND_URL=http://backend:8000
    command: streamlit run app.py --server.address 0.0.0.0 --server.port 8501
    restart: unless-stopped
    depends_on:
      - backend